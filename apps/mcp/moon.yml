$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'

tasks:
  dev:
    command: 'bun run dev'
    options:
      runInCI: false

  build:
    command: 'bun run build'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
      - 'package.json'

  test:
    command: 'bun run test'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
      - 'package.json'
